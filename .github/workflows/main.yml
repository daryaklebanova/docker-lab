name: Build and Test Docker Lab

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_DB: some_name
          POSTGRES_USER: some_user
          POSTGRES_PASSWORD: some_password
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # Обновили на самую свежую версию
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        run: |
          # Ищем build.gradle и собираем
          BUILD_FILE=$(find . -name "build.gradle")
          PROJECT_DIR=$(dirname $BUILD_FILE)
          cd $PROJECT_DIR
          gradle build -x test

      - name: Prepare JAR for Docker
        run: |
          # Ищем любой созданный jar файл и переименовываем
          find . -name "*.jar" -not -name "*plain.jar" -exec cp {} backend.jar \;
          ls -l backend.jar

      - name: Run Docker Compose
        run: docker-compose up -d --build
