name: Build and Test Docker Lab

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_DB: some_name
          POSTGRES_USER: some_user
          POSTGRES_PASSWORD: some_password
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ГЛАВНЫЙ ШАГ: Устанавливаем конкретную версию Gradle, которая дружит с Java 21
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        # Теперь используем команду gradle напрямую
        run: gradle bootJar -x test

      - name: Prepare JAR for Docker
        run: |
          find build/libs/ -name "*.jar" -exec cp {} backend.jar \;
          ls -l backend.jar

      - name: Run Docker Compose
        env:
          DB_NAME: some_name
          DB_USER: some_user
          DB_PASSWORD: some_password
          DB_HOST: postgres-db
        run: docker-compose up -d --build

      - name: Verify
        run: |
          sleep 10
          docker ps
