name: Build and Test Docker Lab

on:
  push:
    branches: [ main, master ]

env:
  # Убираем предупреждение про Node.js
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Запускаем базу данных для тестов (если они понадобятся)
    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_DB: some_name
          POSTGRES_USER: some_user
          POSTGRES_PASSWORD: some_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U some_user -d some_name"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Установка Gradle 8.5 (решает ошибку со скриншота)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        run: |
          # Ищем build.gradle и собираем проект
          BUILD_FILE=$(find . -name "build.gradle")
          PROJECT_DIR=$(dirname $BUILD_FILE)
          cd $PROJECT_DIR
          gradle bootJar -x test

      - name: Prepare JAR for Docker
        run: |
          # Копируем созданный файл в корень как backend.jar для Dockerfile
          find . -name "*.jar" -not -name "*plain.jar" -exec cp {} backend.jar \;
          if [ -f backend.jar ]; then 
            echo "✅ JAR файл успешно найден и скопирован!"
            ls -l backend.jar
          else 
            echo "❌ ОШИБКА: JAR файл не найден!" && exit 1
          fi

      - name: Run Docker Compose
        env:
          DB_NAME: some_name
          DB_USER: some_user
          DB_PASSWORD: some_password
          DB_HOST: postgres-db
        run: docker-compose up -d --build

      - name: Verify Application
        run: |
          sleep 15
          docker ps
          echo "Сборка завершена успешно!"
