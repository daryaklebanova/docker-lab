name: Build and Test Docker Lab

on:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_DB: some_name
          POSTGRES_USER: some_user
          POSTGRES_PASSWORD: some_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U some_user -d some_name"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        run: |
          # Ищем build.gradle и собираем там, где он есть
          BUILD_FILE=$(find . -name "build.gradle")
          PROJECT_DIR=$(dirname $BUILD_FILE)
          cd $PROJECT_DIR
          gradle bootJar -x test

      - name: Prepare JAR for Docker
        run: |
          # Находим созданный JAR и копируем его как backend.jar
          find . -name "*.jar" -not -name "*plain.jar" -exec cp {} backend.jar \;
          if [ -f backend.jar ]; then echo "JAR ready!"; else echo "JAR NOT FOUND" && exit 1; fi

      - name: Run Docker Compose
        env:
          DB_NAME: some_name
          DB_USER: some_user
          DB_PASSWORD: some_password
          DB_HOST: postgres-db
        run: docker-compose up -d --build

      - name: Verify
        run: |
          sleep 10
          docker ps
