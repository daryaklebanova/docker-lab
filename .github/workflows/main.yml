name: Build and Test Docker Lab

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:15
        env:
          POSTGRES_DB: some_name
          POSTGRES_USER: some_user
          POSTGRES_PASSWORD: some_password
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        run: |
          # Ищем, где лежит build.gradle и собираем там
          BUILD_FILE=$(find . -name "build.gradle")
          PROJECT_DIR=$(dirname $BUILD_FILE)
          echo "Building in $PROJECT_DIR"
          cd $PROJECT_DIR
          gradle bootJar -x test

      - name: Prepare JAR for Docker
        run: |
          # Находим созданный jar и кладем его в корень для Dockerfile
          find . -name "*.jar" -exec cp {} backend.jar \;
          ls -l backend.jar

      - name: Run Docker Compose
        env:
          DB_NAME: some_name
          DB_USER: some_user
          DB_PASSWORD: some_password
          DB_HOST: postgres-db
        run: docker-compose up -d --build
